<!--
  ══════════════════════════════════════════════════════════════════
  INSTRUÇÕES PARA index.html  —  Issue: Filtros Avançados e Busca
  ══════════════════════════════════════════════════════════════════

  PASSO 1 ─ Adicione o bloco <link> no <head> (junto com os outros links CSS):
  ───────────────────────────────────────────────────────────────────────────
  <link rel="stylesheet" href="filters.css">

  ══════════════════════════════════════════════════════════════════
  PASSO 2 ─ Cole o painel de filtros ACIMA da tabela de relatórios.
            Localize a sua <table> de relatórios e cole ANTES dela:
  ══════════════════════════════════════════════════════════════════
-->

<!-- FILTROS AVANÇADOS ─ início -->
<div class="filtros-painel">
  <div class="filtros-header">
    <span class="filtros-titulo">◈ FILTROS</span>
    <button id="filtros-limpar" class="filtros-btn-limpar">✕ Limpar</button>
  </div>

  <div class="filtros-grid">

    <!-- Busca por nome -->
    <div class="filtro-grupo">
      <label class="filtro-label" for="filtro-nome">BUSCAR</label>
      <div class="filtro-input-wrapper">
        <span class="filtro-icone">⌕</span>
        <input
          type="text"
          id="filtro-nome"
          class="filtro-input"
          placeholder="Nome do gasto..."
          autocomplete="off"
        />
      </div>
    </div>

    <!-- Filtro por categoria -->
    <div class="filtro-grupo">
      <label class="filtro-label" for="filtro-categoria">CATEGORIA</label>
      <div class="filtro-input-wrapper">
        <select id="filtro-categoria" class="filtro-input filtro-select">
          <option value="">Todas</option>
          <!-- Opções populadas dinamicamente pelo filters.js -->
        </select>
      </div>
    </div>

    <!-- Filtro por mês/ano -->
    <div class="filtro-grupo">
      <label class="filtro-label" for="filtro-mes">MÊS / ANO</label>
      <div class="filtro-input-wrapper">
        <input
          type="month"
          id="filtro-mes"
          class="filtro-input"
        />
      </div>
    </div>

  </div><!-- /.filtros-grid -->
</div><!-- /.filtros-painel / FILTROS AVANÇADOS ─ fim -->

<!--
  ══════════════════════════════════════════════════════════════════
  PASSO 3 ─ Certifique-se de que sua <tbody> tem o id correto:
  ══════════════════════════════════════════════════════════════════

  <table>
    <thead> ... </thead>
    <tbody id="relatorio-tbody"> ← este id é obrigatório
    </tbody>
  </table>

  E que o elemento que exibe o total tenha:
    id="relatorio-total"

  ══════════════════════════════════════════════════════════════════
  PASSO 4 ─ Adicione os scripts no fim do <body>, NESTA ORDEM:
  ══════════════════════════════════════════════════════════════════

  <script src="app.js"></script>       ← já existia
  <script src="filters.js"></script>   ← adicionar após app.js
